apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-app-deployment
  labels:
    app: test-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      # --- Tolerations Section Added Below ---
      tolerations:
      - key: "pool"
        operator: "Equal"
        value: "puli"
        effect: "NoSchedule"
      - key: "key"
        operator: "Equal"
        value: "value"
        effect: "NoSchedule"
      # ----------------------------------------
      containers:
      - name: web-app
        image: puliacr.azurecr.io/test-app:v1
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: test-app-service
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: test-app
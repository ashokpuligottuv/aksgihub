name: Build and Deploy to AKS

on:
  push:
    branches:
      - main # Triggers the pipeline every time you push code to the main branch
    paths:
      - 'server.js' # Triggers the pipeline when server.js is modified
      - 'Dockerfile' # Triggers the pipeline when Dockerfile is modified
      - 'deployment.yaml' # Triggers the pipeline when deployment.yaml is modified

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      changes_detected: ${{ steps.filter.outputs.app }}
    steps:
    - uses: actions/checkout@v4
    - uses: dorny/paths-filter@v3
      id: filter
      with:
        filters: |
          app:
            - 'server.js'
            - 'Dockerfile'

  build-and-deploy:
    runs-on: ubuntu-latest
    needs: check-changes
  
    
    steps:
    # 1. Checkout the application source code from Git
    - name: Checkout Source Code
      uses: actions/checkout@v4

    # 2. Log in directly to your Azure Account
    - name: Azure Login
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    # 3. Log in to your private Azure Container Registry
    - name: Login to ACR
      if: needs.check-changes.outputs.changes_detected == 'true'
      run: |
        az acr login --name ${{ secrets.ACR_NAME }}

    # 4. Build the image locally in GitHub and push it directly to ACR
    - name: Build and Push Docker Image
      if: needs.check-changes.outputs.changes_detected == 'true'
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/test-app:${{ github.sha }} .
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/test-app:${{ github.sha }}
        
# --- UPDATE THIS EXACT STEP ---
    - name: Set up kubelogin
      uses: azure/use-kubelogin@v1
      with:
        kubelogin-version: 'v0.0.34' # <-- Fixed input name
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # <-- Added authentication token

    # 5. Connect to your AKS Cluster target
    - name: Set AKS Context
      uses: azure/aks-set-context@v4
      with:
        #creds: ${{ secrets.AZURE_CREDENTIALS }}
        resource-group: 'RG_AKS' # Ensure this matches your actual RG name
        cluster-name: 'akscluster' # Ensure this matches your actual cluster name
        admin: 'false'
        use-kubelogin: 'true'

    # 6. Dynamically update the deployment.yaml with the fresh image tag and apply it
    - name: Deploy Manifests to AKS
      env:
        AAD_SERVICE_PRINCIPAL_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
        AAD_SERVICE_PRINCIPAL_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      run: |
        # 1. Check if the app build job actually ran a code compilation
        if [ "${{ needs.check-changes.outputs.app_changed }}" = "true" ]; then
          # If the app changed, deploy the exact unique image built in this commit
          TARGET_TAG="${{ github.sha }}"
        else
          # If app code didn't change, tell AKS to pull the latest valid compiled image version
          TARGET_TAG="latest"
        fi

        echo "Deploying target image tag: ${TARGET_TAG}"
        
        # 2. Update the manifest with the calculated target tag
        sed -i "s|image: .*|image: ${{ secrets.ACR_LOGIN_SERVER }}/test-app:${TARGET_TAG}|g" deployment.yaml
        
        # 3. Apply the updated manifest context
        export KUBERNETES_EXEC_INFO='{"apiVersion":"client.authentication.k8s.io/v1beta1","kind":"ExecCredential"}'
        kubectl apply -f deployment.yaml

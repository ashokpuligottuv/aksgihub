apiVersion: v1
kind: Service
metadata:
  name: redis-service
  labels:
    app: redis
spec:
  ports:
  - port: 6379
    name: web
  clusterIP: None # <-- This makes it a "Headless" service
  selector:
    app: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis-db
spec:
  serviceName: "redis-service"
  replicas: 2
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      # Reusing the tolerations that match your current cluster node taints
      tolerations:
      - key: "pool"
        operator: "Equal"
        value: "puli"
        effect: "NoSchedule"
      - key: "key"
        operator: "Equal"
        value: "value"
        effect: "NoSchedule"
      containers:
      - name: redis
        image: redis:7.0-alpine
        ports:
        - containerPort: 6379
          name: web
        volumeMounts:
        - name: redis-data-storage
          mountPath: /data
  # --- Dynamic Storage Provisioning ---
  volumeClaimTemplates:
  - metadata:
      name: redis-data-storage
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "default" # Instructs AKS to use standard Azure Managed Disks
      resources:
        requests:
          storage: 1Gi